<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올리브영 리뷰 분석 리포트 - 쿠션</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-7xl mx-auto px-4 py-8">

  <!-- 헤더 -->
  <div class="bg-white rounded-xl shadow-sm border p-6 mb-8">
    <h1 class="text-2xl font-bold text-gray-900">올리브영 리뷰 분석 리포트</h1>
    <div class="flex flex-wrap gap-6 mt-3 text-sm text-gray-600">
      <span>🔍 검색어: <strong>쿠션</strong></span>
      <span>📦 상품 수: <strong>22개</strong></span>
      <span>📊 리뷰 통계: <strong id="stats-count">-</strong>개 수집</span>
      <span>📅 2026-05-31</span>
    </div>
  </div>

  <!-- 요약 비교 테이블 -->
  <div class="bg-white rounded-xl shadow-sm border p-6 mb-8">
    <h2 class="text-lg font-bold text-gray-900 mb-4">📋 상품 비교 요약 (평점순)</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-3 py-2 text-left">#</th>
            <th class="px-3 py-2 text-left">브랜드</th>
            <th class="px-3 py-2 text-left">상품명</th>
            <th class="px-3 py-2 text-right">평점</th>
            <th class="px-3 py-2 text-right">리뷰 수</th>
            <th class="px-3 py-2 text-right">가격</th>
            <th class="px-3 py-2 text-center" id="attr-headers"></th>
          </tr>
        </thead>
        <tbody id="summary-table"></tbody>
      </table>
    </div>
  </div>

  <!-- 속성별 비교 차트 -->
  <div class="bg-white rounded-xl shadow-sm border p-6 mb-8">
    <h2 class="text-lg font-bold text-gray-900 mb-4">📊 속성별 만족도 비교 (상위 10개 상품)</h2>
    <div id="attr-charts" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
  </div>

  <!-- 개별 상품 상세 -->
  <h2 class="text-lg font-bold text-gray-900 mb-4">🔎 상품별 상세 리뷰 통계</h2>
  <div id="products" class="space-y-4"></div>

</div>

<script>
const products = [{"id": "A000000251851", "name": "[NEW22호출시/리필증정 리뷰이벤트] 네이밍 올데이 마스터 쿠션 기획 (본품+리필)", "brand": "네이밍", "price": 26730, "originalPrice": 34000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0025/A00000025185113ko.jpg?l=ko", "reviewCount": 661, "reviewStats": null}, {"id": "A000000249162", "name": "[리필+실버파우치 증정] 라네즈 네오 쿠션 더 매트 15g", "brand": "라네즈", "price": 23520, "originalPrice": 30000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0024/A00000024916216ko.jpg?l=ko", "reviewCount": 1811, "reviewStats": null}, {"id": "A000000139022", "name": "[롱래스팅쿠션] 정샘물 에센셜 스킨 누더 롱웨어 쿠션 (본품+리필)", "brand": "정샘물", "price": 37950, "originalPrice": 48000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0013/A00000013902272ko.jpg?l=ko", "reviewCount": 5364, "reviewStats": null}, {"id": "A000000226593", "name": "[올영세일특가/모공커버쿠션] 네이밍 제로 그래비티 커버 업 쿠션 기획(본품+리필)", "brand": "네이밍", "price": 25840, "originalPrice": 34000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0022/A00000022659373ko.jpg?l=ko", "reviewCount": 4705, "reviewStats": null}, {"id": "A000000232144", "name": "투쿨포스쿨 픽싱 커버 핏 쿠션 (+리필2개 단독기획)", "brand": "투쿨포스쿨", "price": 22800, "originalPrice": 38000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0023/A00000023214421ko.png?l=ko", "reviewCount": 3896, "reviewStats": null}, {"id": "A000000219580", "name": "[NEW단독기획] 티르티르 마스크 핏 AI 필터 쿠션 (기획/단품)", "brand": "티르티르", "price": 20880, "originalPrice": 29000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0021/A00000021958033ko.jpg?l=ko", "reviewCount": 2350, "reviewStats": null}, {"id": "A000000232517", "name": "[미니쿠션/포켓뷰티] 에스쁘아 미니 쿠션 3종 택1 (비벨벳/비글로우/세범컷)", "brand": "에스쁘아", "price": 12160, "originalPrice": 16000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0023/A00000023251713ko.jpg?l=ko", "reviewCount": 458, "reviewStats": null}, {"id": "A000000224326", "name": "[한겹밀착쿠션] 코스노리 플러핏 라이트매트 쿠션 (단품/기획)", "brand": "코스노리", "price": 14790, "originalPrice": 32000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0022/A00000022432637ko.jpg?l=ko", "reviewCount": 1946, "reviewStats": null}, {"id": "A000000231907", "name": "[뽀송매트] 이지듀 멜라 비 토닝 매트 커버 팩트 19g", "brand": "이지듀", "price": 36860, "originalPrice": 39800, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0023/A00000023190708ko.jpg?l=ko", "reviewCount": 82, "reviewStats": null}, {"id": "A000000164072", "name": "[롬앤X이나피스퀘어] 롬앤 누 제로 쿠션", "brand": "롬앤", "price": 18910, "originalPrice": 25000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0016/A00000016407228ko.jpg?l=ko", "reviewCount": 5301, "reviewStats": null}, {"id": "A000000225000", "name": "[퍼스트맨 PICK/한겹 쿠션] 더툴랩 스탬프 스킨핏 쿠션 에어리 (브러쉬 세트/리필 세트/단품)", "brand": "더툴랩", "price": 39510, "originalPrice": 57000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0022/A00000022500031ko.png?l=ko", "reviewCount": 251, "reviewStats": null}, {"id": "A000000210402", "name": "[리필기획] AGE20S 실키 픽싱 팩트(본품+리필)", "brand": "에이지투웨니스", "price": 27360, "originalPrice": 38000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0021/A00000021040224ko.jpg?l=ko", "reviewCount": 128, "reviewStats": null}, {"id": "A000000226096", "name": "[컨실러/리필 증정] 웨이크메이크 심리스 웨어 쿠션 9COLOR(기획)", "brand": "웨이크메이크", "price": 22820, "originalPrice": 36000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0022/A00000022609631ko.jpg?l=ko", "reviewCount": 3370, "reviewStats": null}, {"id": "A000000184641", "name": "지베르니 밀착 매트핏 쿠션(본품+리필)", "brand": "지베르니", "price": 26010, "originalPrice": 37000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0018/A00000018464117ko.jpg?l=ko", "reviewCount": 986, "reviewStats": null}, {"id": "A000000231781", "name": "[NEW] 티르티르 마스크 핏 AI 필터 미니 쿠션", "brand": "티르티르", "price": 12240, "originalPrice": 17000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0023/A00000023178106ko.jpg?l=ko", "reviewCount": 85, "reviewStats": null}, {"id": "A000000221775", "name": "바비브라운 웨이트리스 스킨 쿠션 파운데이션 SPF40 PA+++", "brand": "바비브라운", "price": 63200, "originalPrice": 79000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0022/A00000022177508ko.jpg?l=ko", "reviewCount": 11, "reviewStats": null}, {"id": "A000000231189", "name": "[RIIZE원빈PICK] 이더앤 블러 픽셀 쿠션 12g 6종 (단품/기획)", "brand": "이더앤", "price": 22950, "originalPrice": 34000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0023/A00000023118914ko.jpg?l=ko", "reviewCount": 177, "reviewStats": null}, {"id": "A000000199953", "name": "무지개맨션 슬릭매트 쿠션", "brand": "무지개맨션", "price": 26250, "originalPrice": 35000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0019/A00000019995313ko.png?l=ko", "reviewCount": 949, "reviewStats": null}, {"id": "A000000227099", "name": "[NEW] 삐아 오 매트 쿠션 15g 3종", "brand": "삐아", "price": 12000, "originalPrice": 30000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0022/A00000022709910ko.jpg?l=ko", "reviewCount": 42, "reviewStats": null}, {"id": "A000000199741", "name": "루나 블러 커버 쿠션 12g (단품)", "brand": "루나", "price": 21760, "originalPrice": 34000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0019/A00000019974113ko.jpg?l=ko", "reviewCount": 487, "reviewStats": null}, {"id": "A000000231388", "name": "[리필출시/모공쿠션] 더툴랩 스탬프 스킨핏 쿠션 에어리 리필", "brand": "더툴랩", "price": 17100, "originalPrice": 20000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0023/A00000023138821ko.jpg?l=ko", "reviewCount": 5, "reviewStats": null}, {"id": "A000000208283", "name": "웨이크메이크 스테이 픽서 매끈 프라이머밤 수분 부스팅", "brand": "웨이크메이크", "price": 16800, "originalPrice": 23000, "imageUrl": "https://image.oliveyoung.co.kr/cfimages/cf-goods/uploads/images/thumbnails/10/0000/0020/A00000020828308ko.jpg?l=ko", "reviewCount": 575, "reviewStats": null}];

// 평점순 정렬
products.sort((a, b) => {
  const ra = a.reviewStats?.averageRating || 0;
  const rb = b.reviewStats?.averageRating || 0;
  if (rb !== ra) return rb - ra;
  return (b.reviewStats?.reviewCount || b.reviewCount || 0) - (a.reviewStats?.reviewCount || a.reviewCount || 0);
});

const statsCount = products.filter(p => p.reviewStats).length;
document.getElementById('stats-count').textContent = statsCount;

// 요약 테이블
const tbody = document.getElementById('summary-table');
products.forEach((p, idx) => {
  const stats = p.reviewStats;
  const rating = stats?.averageRating?.toFixed(1) || '-';
  const count = (stats?.reviewCount || p.reviewCount || 0).toLocaleString();
  const price = p.price.toLocaleString();

  // 속성 요약 (첫 번째 답변의 이름만)
  let attrSummary = '';
  if (stats?.attributes) {
    attrSummary = stats.attributes.map(a => {
      const top = a.answers[0];
      return top ? `<span class="inline-block px-2 py-0.5 bg-blue-50 text-blue-700 rounded text-xs mr-1">${a.name}: ${top.name} ${top.percentage}%</span>` : '';
    }).join('');
  }

  const ratingColor = rating >= 4.5 ? 'text-green-600' : rating >= 4.0 ? 'text-yellow-600' : 'text-red-600';

  tbody.innerHTML += `<tr class="border-t hover:bg-gray-50">
    <td class="px-3 py-2 text-gray-500">${idx+1}</td>
    <td class="px-3 py-2 font-medium">${p.brand}</td>
    <td class="px-3 py-2">${p.name.length > 40 ? p.name.slice(0,40)+'...' : p.name}</td>
    <td class="px-3 py-2 text-right font-bold ${ratingColor}">★ ${rating}</td>
    <td class="px-3 py-2 text-right">${count}</td>
    <td class="px-3 py-2 text-right">${price}원</td>
    <td class="px-3 py-2">${attrSummary}</td>
  </tr>`;
});

// 속성별 비교 차트
const chartsContainer = document.getElementById('attr-charts');
const productsWithStats = products.filter(p => p.reviewStats?.attributes?.length > 0).slice(0, 10);

if (productsWithStats.length > 0) {
  const attrNames = productsWithStats[0].reviewStats.attributes.map(a => a.name);

  attrNames.forEach(attrName => {
    const chartDiv = document.createElement('div');
    chartDiv.innerHTML = `<canvas id="chart-${attrName}"></canvas>`;
    chartsContainer.appendChild(chartDiv);

    const labels = productsWithStats.map(p => p.brand + ' ' + p.name.slice(0, 15));
    const topAnswerPcts = productsWithStats.map(p => {
      const attr = p.reviewStats.attributes.find(a => a.name === attrName);
      return attr?.answers[0]?.percentage || 0;
    });

    new Chart(document.getElementById(`chart-${attrName}`), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: `${attrName} - 최고 만족도 (%)`,
          data: topAnswerPcts,
          backgroundColor: 'rgba(59, 130, 246, 0.6)',
          borderColor: 'rgba(59, 130, 246, 1)',
          borderWidth: 1,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false }, title: { display: true, text: attrName } },
        scales: { x: { max: 100, ticks: { callback: v => v + '%' } } }
      }
    });
  });
}

// 개별 상품 카드
const container = document.getElementById('products');
products.forEach((p, idx) => {
  const stats = p.reviewStats;
  const rating = stats?.averageRating?.toFixed(1) || '-';
  const reviewCount = (stats?.reviewCount || p.reviewCount || 0).toLocaleString();
  const price = p.price.toLocaleString();

  let ratingBars = '';
  if (stats?.ratingDistribution) {
    ratingBars = stats.ratingDistribution.map(r =>
      `<div class="flex items-center gap-2 text-xs">
        <span class="w-6 text-right">${r.rating}점</span>
        <div class="flex-1 bg-gray-200 rounded-full h-3">
          <div class="bg-green-500 h-3 rounded-full" style="width:${r.percentage}%"></div>
        </div>
        <span class="w-8 text-right">${r.percentage}%</span>
      </div>`
    ).join('');
  }

  let attrHtml = '';
  if (stats?.attributes) {
    attrHtml = stats.attributes.map(attr => {
      const bars = attr.answers.map(a =>
        `<div class="flex items-center gap-2 text-xs">
          <span class="w-24 truncate">${a.name}</span>
          <div class="flex-1 bg-gray-200 rounded-full h-2.5">
            <div class="bg-blue-400 h-2.5 rounded-full" style="width:${a.percentage}%"></div>
          </div>
          <span class="w-8 text-right">${a.percentage}%</span>
        </div>`
      ).join('');
      return `<div><h4 class="text-xs font-medium text-gray-600 mb-1">${attr.name}</h4>${bars}</div>`;
    }).join('');
  }

  container.innerHTML += `
    <details class="bg-white rounded-lg shadow-sm border border-gray-200">
      <summary class="p-4 cursor-pointer hover:bg-gray-50 flex items-center gap-3">
        ${p.imageUrl ? `<img src="${p.imageUrl}" class="w-12 h-12 object-cover rounded">` : ''}
        <div class="flex-1 min-w-0">
          <span class="text-xs text-gray-500">#${idx+1} ${p.brand}</span>
          <p class="text-sm font-medium text-gray-900 truncate">${p.name}</p>
        </div>
        <div class="text-right">
          <span class="text-lg font-bold text-yellow-500">★ ${rating}</span>
          <p class="text-xs text-gray-500">${reviewCount}개 리뷰 · ${price}원</p>
        </div>
      </summary>
      <div class="px-4 pb-4 pt-2 border-t">
        ${stats ? `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div><h4 class="text-sm font-medium mb-2">평점 분포</h4>${ratingBars}</div>
          <div class="md:col-span-2 grid grid-cols-2 gap-3">${attrHtml}</div>
        </div>` : '<p class="text-gray-400 text-sm">리뷰 통계를 가져오지 못했습니다.</p>'}
      </div>
    </details>`;
});
</script>
</body>
</html>
